<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码备份管家 v1.0.0 - Windows 98 Edition</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'auto';
            if (theme === 'dark') {
                document.documentElement.className = 'theme-dark';
            } else if (theme === 'light') {
                document.documentElement.className = 'theme-light';
            } else {
                document.documentElement.className = '';
            }
        })();
    </script>
</head>
<body>
    <div class="app-container">
        <!-- Main Workspace Window -->
        <div class="window main-window">
            
            <!-- Menu Bar -->
            <div class="menu-bar">
                <div class="menu-item">文件(F)</div>
                <div class="menu-item" id="menu-trigger-settings">编辑(E)</div>
                <div class="menu-item">工具(T)</div>
                <div class="menu-item">帮助(H)</div>
            </div>

            <!-- Toolbar -->
            <div class="toolbar">
                <button id="btn-sync-active" class="win98-btn">
                    <span class="btn-text">🔄 更新全部已备份项目</span>
                </button>
                <button id="btn-settings" class="win98-btn">
                    <span class="btn-text">⚙️ 备份同步配置...</span>
                </button>
                <button id="btn-theme-toggle" class="win98-btn" style="margin-left: auto;">
                    <span class="btn-text" id="theme-toggle-text">🌓 主题: 自动</span>
                </button>
            </div>

            <!-- Merged Stats Bar (Inline status panels) -->
            <div class="stats-bar-inline">
                <div class="status-panel">
                    <span class="status-label">检测文件夹数:</span>
                    <span id="stat-total-repos" class="status-value">0</span>
                </div>
                <div class="status-panel">
                    <span class="status-label">Git仓库数:</span>
                    <span id="stat-git-repos" class="status-value">0</span>
                </div>
                <div class="status-panel">
                    <span class="status-label">待备份修改:</span>
                    <span id="stat-dirty-repos" class="status-value">0</span>
                </div>
                <div class="status-panel">
                    <span class="status-label">备份云盘目的地:</span>
                    <span id="stat-backup-dest-name" class="status-value truncate" title="未设置">未设置</span>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <div class="search-box">
                    <label for="repo-search" style="font-size: 11px; margin-right: 6px;">过滤项目:</label>
                    <input type="text" id="repo-search" placeholder="输入关键字筛选项目...">
                </div>
            </div>

            <div class="window-body main-body">
                <!-- List View (Table container) -->
                <div class="list-view-container">
                    <table class="repo-table">
                        <thead>
                            <tr class="header-sort-row">
                                <th data-sort="name" style="cursor: pointer;">项目名称<span class="sort-indicator"> ▲</span></th>
                                <th data-sort="path" style="cursor: pointer;">本地路径<span class="sort-indicator"> ▲</span></th>
                                <th data-sort="is_git" style="cursor: pointer;">Git状态<span class="sort-indicator"> ▲</span></th>
                                <th data-sort="file_count" style="cursor: pointer;">文件数<span class="sort-indicator"> ▲</span></th>
                                <th data-sort="has_changes" style="cursor: pointer;">修改状态<span class="sort-indicator"> ▲</span></th>
                                <th data-sort="last_sync_time" style="cursor: pointer;">上次备份时间<span class="sort-indicator"> ▲</span></th>
                                <th data-sort="last_sync_status" style="cursor: pointer;">备份状态<span class="sort-indicator"> ▲</span></th>
                                <th>操作</th>
                            </tr>
                            <tr class="header-filter-row">
                                <th><input type="text" id="filter-name" class="col-filter" placeholder="筛选名称..."></th>
                                <th><input type="text" id="filter-path" class="col-filter" placeholder="筛选路径..."></th>
                                <th>
                                    <select id="filter-is-git" class="col-filter">
                                        <option value="">全部</option>
                                        <option value="git">Git 仓库</option>
                                        <option value="nogit">非 Git</option>
                                    </select>
                                </th>
                                <th><input type="number" id="filter-file-count" class="col-filter" placeholder="最少..." min="0"></th>
                                <th>
                                    <select id="filter-has-changes" class="col-filter">
                                        <option value="">全部</option>
                                        <option value="dirty">有修改</option>
                                        <option value="clean">已提交</option>
                                        <option value="nogit">非 Git</option>
                                    </select>
                                </th>
                                <th></th>
                                <th>
                                    <select id="filter-last-sync-status" class="col-filter">
                                        <option value="">全部</option>
                                        <option value="Success">成功</option>
                                        <option value="Failed">失败</option>
                                        <option value="Pending">待备份</option>
                                    </select>
                                </th>
                                <th style="text-align: center;">
                                    <button id="btn-clear-filters" class="win98-btn" style="padding: 1px 4px; font-size: inherit; width: 100%;">重置</button>
                                </th>
                            </tr>
                        </thead>
                        <tbody id="repo-list">
                            <tr>
                                <td colspan="8" class="text-center">正在加载项目列表中，请稍候...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Dialog -->
    <div id="settings-modal" class="modal-overlay">
        <div class="window dialog-box">
            <div class="title-bar">
                <div class="title-bar-text">全局同步配置</div>
                <div class="title-bar-controls">
                    <button id="btn-close-settings" aria-label="Close"></button>
                </div>
            </div>
            <div class="window-body">
                <form id="settings-form">
                    <!-- Backup Destination -->
                    <fieldset class="group-box">
                        <legend>备份目标位置</legend>
                        <div class="form-group-win98">
                            <label for="input-backup-dest">云盘备份目标文件夹（例如 Google Drive 虚拟盘路径）:</label>
                            <div class="input-row">
                                <input type="text" id="input-backup-dest" placeholder="选择或输入备份目标路径" required>
                                <button type="button" id="btn-browse-dest" class="win98-btn">选择...</button>
                            </div>
                            <p class="form-help">建议直接选择 Google Drive 虚拟盘（例如 D:\我的云端硬盘 或 G:\我的云端硬盘）下的某个文件夹。</p>
                        </div>
                    </fieldset>

                    <!-- Monitored Folders -->
                    <fieldset class="group-box">
                        <legend>监控的本地代码目录</legend>
                        <div class="form-group-win98">
                            <label>正在监控的主目录列表:</label>
                            <div class="folder-list-box">
                                <ul id="monitored-folders-list" class="win98-list">
                                    <!-- Dynamic List -->
                                </ul>
                            </div>
                            <div class="add-folder-row">
                                <input type="text" id="input-new-folder" placeholder="点击右侧“选择...”浏览文件夹..." readonly>
                                <button type="button" id="btn-browse-folder" class="win98-btn">选择...</button>
                                <button type="button" id="btn-add-folder" class="win98-btn">添加</button>
                            </div>
                        </div>
                    </fieldset>

                    <div class="form-actions">
                        <button type="submit" class="win98-btn default-btn">确定</button>
                        <button type="button" id="btn-cancel-settings" class="win98-btn">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Notification Dialog -->
    <div id="toast" class="toast-win98 window">
        <div class="title-bar">
            <div class="title-bar-text" id="toast-title">系统信息</div>
        </div>
        <div class="window-body toast-body">
            <div class="toast-message-container">
                <span class="info-icon">ℹ️</span>
                <span id="toast-message">提示内容</span>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
